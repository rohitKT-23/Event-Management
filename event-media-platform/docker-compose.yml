# ──────────────────────────────────────────────────────────────────
# Event & Media Management Platform — local stack
# Starts: postgres, redis, minio (S3-compatible for dev), and
# optionally the api + worker + web containers.
# Run `docker compose up -d postgres redis minio` for infra-only.
# ──────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: emp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-emp}
    ports:
      # Default 5433 — 5432 is often taken by a local PostgreSQL install on Windows/Mac
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: emp-redis
    restart: unless-stopped
    ports:
      # Default 6380 — 6379 is often taken by a local Redis install
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO gives us an S3-compatible local store for dev so we
  # don't need real AWS credentials while building features.
  minio:
    image: minio/minio:latest
    container_name: emp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-emp_minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-emp_minio_password}
    ports:
      # Default 9002/9003 — 9000/9001 are often taken by other MinIO/S3 tools
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: emp-api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["full"]

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: emp-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["full"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: emp-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["full"]

volumes:
  postgres-data:
  redis-data:
  minio-data:
