name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emp
          POSTGRES_PASSWORD: emp_dev_password
          POSTGRES_DB: emp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Prisma generate
        working-directory: apps/api
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://emp:emp_dev_password@localhost:5432/emp_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci_access_secret_xxxxxxxxxxxxxxxxxxxxxxxx
          JWT_REFRESH_SECRET: ci_refresh_secret_xxxxxxxxxxxxxxxxxxxxxxx

      - name: Test
        run: npm test --if-present
